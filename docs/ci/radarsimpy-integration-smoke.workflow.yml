name: RadarSimPy Integration Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Minimal Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run RadarSimPy Integration Smoke Gate
        env:
          PYTHONPATH: src
        run: |
          python scripts/run_radarsimpy_integration_smoke_gate.py \
            --output-summary-json docs/reports/radarsimpy_integration_smoke_gate_ci_summary.json

      - name: Upload Smoke Gate Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radarsimpy-integration-smoke-summary
          path: docs/reports/radarsimpy_integration_smoke_gate_ci_summary.json
