<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radar Graph Lab (ReactFlow)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.9.0/dist/style.css" />
  <style>
    :root {
      --bg: #0b131a;
      --panel: #111f29;
      --panel-2: #0e1a23;
      --line: #254254;
      --text: #d2e2ed;
      --muted: #86a1b4;
      --ok: #35c885;
      --warn: #f0b33a;
      --err: #f06363;
      --accent: #19b4d7;
      --accent-2: #58d9b3;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(1200px 600px at 10% -20%, #1d3848 0%, transparent 60%), var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }
    .page {
      height: 100%;
      display: grid;
      grid-template-rows: 56px 1fr;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(17,31,41,0.94), rgba(17,31,41,0.72));
      backdrop-filter: blur(6px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(25, 180, 215, 0.45);
    }
    .brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr 360px;
      gap: 10px;
      padding: 10px;
    }
    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17,31,41,0.96), rgba(14,26,35,0.96));
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-hd {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }
    .panel-bd {
      padding: 10px 12px;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .flow-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .label {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }
    .input, .select, .textarea, .btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      padding: 8px 9px;
    }
    .textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }
    .btn {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .btn:hover {
      border-color: #3e7088;
      transform: translateY(-1px);
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      background: rgba(15, 30, 40, 0.6);
    }
    .status-ok { color: var(--ok); }
    .status-warn { color: var(--warn); }
    .status-err { color: var(--err); }
    .status-neutral { color: var(--muted); }
    .result-box {
      border: 1px solid var(--line);
      background: rgba(9, 19, 26, 0.88);
      border-radius: 8px;
      padding: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      line-height: 1.45;
      min-height: 110px;
      color: #b9d5e7;
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      background: rgba(13, 25, 34, 0.65);
    }
    .contract-overlay {
      position: fixed;
      right: 14px;
      top: 68px;
      width: min(420px, calc(100vw - 28px));
      max-height: calc(100vh - 82px);
      border: 1px solid #2f566a;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(10, 26, 35, 0.97), rgba(10, 20, 28, 0.97));
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .contract-overlay-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: #9bc3d8;
      background: rgba(15, 35, 48, 0.9);
    }
    .contract-overlay-actions {
      display: inline-flex;
      gap: 6px;
    }
    .contract-overlay-actions .btn {
      padding: 5px 8px;
      font-size: 11px;
    }
    .contract-overlay-bd {
      overflow: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .contract-overlay-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: #9bc3d8;
      background: rgba(11, 24, 33, 0.92);
    }
    .contract-overlay-filter .select {
      min-width: 110px;
      padding: 5px 7px;
      font-size: 11px;
    }
    .contract-overlay-row {
      border: 1px solid #27485a;
      border-radius: 8px;
      background: rgba(9, 18, 24, 0.86);
      padding: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      line-height: 1.45;
      color: #b9d5e7;
    }
    .contract-overlay-row-hd {
      color: #8eb6ca;
      margin-bottom: 4px;
    }
    .contract-overlay-row-kpi {
      color: #d3ebff;
    }
    .contract-overlay-row.compact {
      padding: 6px 8px;
    }
    .contract-overlay-row-compact {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #cde3f2;
      line-height: 1.35;
    }
    .contract-sev-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 18px;
      border-radius: 999px;
      padding: 0 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: 6px;
      border: 1px solid transparent;
    }
    .contract-sev-badge.high {
      color: #ffd5d5;
      background: rgba(143, 39, 39, 0.45);
      border-color: #b94848;
    }
    .contract-sev-badge.med {
      color: #ffe9bf;
      background: rgba(118, 89, 24, 0.45);
      border-color: #c28c2f;
    }
    .contract-sev-badge.low {
      color: #caf6e4;
      background: rgba(32, 96, 70, 0.38);
      border-color: #3eae7f;
    }
    .contract-sev-high {
      border-color: #b74a4a;
    }
    .contract-sev-med {
      border-color: #9f7d3c;
    }
    .contract-sev-low {
      border-color: #3f7a63;
    }
    @media (max-width: 1280px) {
      .content {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(420px, 1fr) auto;
      }
    }
    .react-flow__node-default {
      border-radius: 8px !important;
      border: 1px solid #2d566b !important;
      background: linear-gradient(180deg, #15303f, #112835) !important;
      color: #d7ecf7 !important;
      font-family: "JetBrains Mono", monospace !important;
      font-size: 11px !important;
      min-width: 180px;
    }
    .react-flow__attribution {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module" src="./graph_lab/main.mjs"></script>
</body>
</html>
