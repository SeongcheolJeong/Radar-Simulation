<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radar Graph Lab (ReactFlow)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.9.0/dist/style.css" />
  <style>
    :root {
      --bg: #0b131a;
      --panel: #111f29;
      --panel-2: #0e1a23;
      --line: #254254;
      --text: #d2e2ed;
      --muted: #86a1b4;
      --ok: #35c885;
      --warn: #f0b33a;
      --err: #f06363;
      --accent: #19b4d7;
      --accent-2: #58d9b3;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(1200px 600px at 10% -20%, #1d3848 0%, transparent 60%), var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }
    .page {
      height: 100%;
      display: grid;
      grid-template-rows: 78px 1fr;
    }
    .topbar {
      display: flex;
      align-items: stretch;
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(17,31,41,0.97), rgba(15,28,37,0.9));
      backdrop-filter: blur(6px);
    }
    .top-main {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) auto;
      align-items: center;
      column-gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(25, 180, 215, 0.45);
    }
    .brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand-sub {
      font-size: 11px;
      color: var(--muted);
    }
    .top-pipeline {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      padding: 0 6px;
      scrollbar-width: thin;
    }
    .pipeline-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #2a4b5d;
      border-radius: 999px;
      padding: 4px 8px;
      color: #89a8bc;
      background: rgba(10, 20, 27, 0.72);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      white-space: nowrap;
      transition: border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }
    .pipeline-step.done {
      border-color: #3b8468;
      color: #b9e7d3;
      background: rgba(19, 46, 36, 0.58);
    }
    .pipeline-step.active {
      border-color: #34a3c7;
      color: #d9f3ff;
      background: rgba(18, 48, 63, 0.62);
      transform: translateY(-1px);
    }
    .pipeline-index {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(129, 173, 198, 0.44);
      font-size: 9px;
    }
    .pipeline-arrow {
      color: #5886a0;
      font-size: 12px;
      line-height: 1;
      user-select: none;
    }
    .top-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      border: 1px solid #28485a;
      border-radius: 999px;
      background: rgba(11, 24, 33, 0.7);
      font-family: "JetBrains Mono", monospace;
    }
    .toolbar-label {
      font-size: 10px;
      color: #86a1b4;
      padding: 0 4px 0 2px;
      text-transform: lowercase;
    }
    .toolbar-btn {
      border: 1px solid #2a495a;
      border-radius: 999px;
      background: rgba(16, 30, 39, 0.82);
      color: #8fb0c2;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      line-height: 1;
      padding: 6px 8px;
      cursor: pointer;
      text-transform: lowercase;
    }
    .toolbar-btn:hover {
      border-color: #3f6f86;
      color: #c0dfef;
    }
    .toolbar-btn.active {
      border-color: #2e92b4;
      color: #d9f3ff;
      background: rgba(18, 54, 71, 0.76);
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr 360px;
      gap: 10px;
      padding: 10px;
      position: relative;
      isolation: isolate;
    }
    .content.view-build {
      grid-template-columns: 350px 1fr 320px;
    }
    .content.view-review {
      grid-template-columns: 270px 1fr 430px;
    }
    .content.view-focus {
      grid-template-columns: 1fr;
    }
    .content.view-focus .panel-left,
    .content.view-focus .panel-right {
      display: none;
    }
    .content.view-focus .panel-center {
      min-width: 0;
      min-height: 0;
    }
    .content.view-focus.focus-left-open .panel-left {
      display: flex;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(380px, calc(100vw - 20px));
      z-index: 24;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.42);
    }
    .content.view-focus.focus-right-open .panel-right {
      display: flex;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(420px, calc(100vw - 20px));
      z-index: 24;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.42);
    }
    .focus-backdrop {
      display: none;
    }
    .content.view-focus .focus-backdrop {
      display: block;
      position: absolute;
      inset: 0;
      border: 0;
      margin: 0;
      padding: 0;
      background: rgba(2, 8, 12, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 130ms ease;
      z-index: 18;
      border-radius: 10px;
      cursor: pointer;
    }
    .content.view-focus.focus-any-open .focus-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17,31,41,0.96), rgba(14,26,35,0.96));
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-left {
      background: linear-gradient(180deg, rgba(18, 33, 43, 0.97), rgba(13, 24, 33, 0.96));
    }
    .panel-right {
      background: linear-gradient(180deg, rgba(16, 30, 40, 0.97), rgba(11, 21, 29, 0.96));
    }
    .panel-center {
      background: linear-gradient(180deg, rgba(13, 24, 33, 0.97), rgba(9, 18, 26, 0.96));
    }
    .panel-hd {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }
    .panel-bd {
      padding: 10px 12px;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .flow-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .label {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }
    .input, .select, .textarea, .btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      padding: 8px 9px;
    }
    .textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }
    .density-compact .panel-hd {
      padding: 8px 10px;
      font-size: 11px;
    }
    .density-compact .panel-bd {
      padding: 8px 10px;
      gap: 8px;
    }
    .density-compact .input,
    .density-compact .select,
    .density-compact .textarea,
    .density-compact .btn {
      font-size: 11px;
      padding: 6px 8px;
    }
    .density-compact .textarea {
      min-height: 108px;
    }
    .density-compact .result-box {
      min-height: 92px;
      padding: 8px;
    }
    .btn {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .btn:hover {
      border-color: #3e7088;
      transform: translateY(-1px);
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      background: rgba(15, 30, 40, 0.6);
    }
    .status-ok { color: var(--ok); }
    .status-warn { color: var(--warn); }
    .status-err { color: var(--err); }
    .status-neutral { color: var(--muted); }
    .result-box {
      border: 1px solid var(--line);
      background: rgba(9, 19, 26, 0.88);
      border-radius: 8px;
      padding: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      line-height: 1.45;
      min-height: 110px;
      color: #b9d5e7;
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      background: rgba(13, 25, 34, 0.65);
    }
    .contract-overlay {
      position: fixed;
      right: 14px;
      top: 68px;
      width: min(420px, calc(100vw - 28px));
      max-height: calc(100vh - 82px);
      border: 1px solid #2f566a;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(10, 26, 35, 0.97), rgba(10, 20, 28, 0.97));
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .contract-overlay-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: #9bc3d8;
      background: rgba(15, 35, 48, 0.9);
    }
    .contract-overlay-actions {
      display: inline-flex;
      gap: 6px;
    }
    .contract-overlay-actions .btn {
      padding: 5px 8px;
      font-size: 11px;
    }
    .contract-overlay-bd {
      overflow: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .contract-overlay-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: #9bc3d8;
      background: rgba(11, 24, 33, 0.92);
    }
    .contract-overlay-filter .select {
      min-width: 110px;
      padding: 5px 7px;
      font-size: 11px;
    }
    .contract-overlay-row {
      border: 1px solid #27485a;
      border-radius: 8px;
      background: rgba(9, 18, 24, 0.86);
      padding: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      line-height: 1.45;
      color: #b9d5e7;
    }
    .contract-overlay-row-hd {
      color: #8eb6ca;
      margin-bottom: 4px;
    }
    .contract-overlay-row-kpi {
      color: #d3ebff;
    }
    .contract-overlay-row-actions {
      margin-top: 6px;
      display: flex;
      justify-content: flex-end;
    }
    .contract-overlay-row.compact {
      padding: 6px 8px;
    }
    .contract-overlay-row-compact {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #cde3f2;
      line-height: 1.35;
    }
    .contract-sev-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 18px;
      border-radius: 999px;
      padding: 0 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: 6px;
      border: 1px solid transparent;
    }
    .contract-sev-badge.high {
      color: #ffd5d5;
      background: rgba(143, 39, 39, 0.45);
      border-color: #b94848;
    }
    .contract-sev-badge.med {
      color: #ffe9bf;
      background: rgba(118, 89, 24, 0.45);
      border-color: #c28c2f;
    }
    .contract-sev-badge.low {
      color: #caf6e4;
      background: rgba(32, 96, 70, 0.38);
      border-color: #3eae7f;
    }
    .contract-sev-high {
      border-color: #b74a4a;
    }
    .contract-sev-med {
      border-color: #9f7d3c;
    }
    .contract-sev-low {
      border-color: #3f7a63;
    }
    .contract-policy-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 18px;
      border-radius: 999px;
      padding: 0 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-right: 6px;
      border: 1px solid transparent;
      font-family: "JetBrains Mono", monospace;
    }
    .contract-policy-tag.hold {
      color: #ffe0b6;
      background: rgba(117, 71, 22, 0.42);
      border-color: #c28132;
    }
    .contract-policy-tag.adopt {
      color: #cbf6e2;
      background: rgba(26, 90, 58, 0.42);
      border-color: #3db07e;
    }
    .contract-failure-rule-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 18px;
      border-radius: 999px;
      padding: 0 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-right: 5px;
      color: #f8e2b6;
      background: rgba(84, 63, 28, 0.4);
      border: 1px solid #a98543;
      font-family: "JetBrains Mono", monospace;
    }
    .contract-open-run-btn {
      padding: 4px 7px;
      font-size: 10px;
      line-height: 1;
      min-height: 0;
    }
    .contract-open-gate-btn {
      padding: 4px 7px;
      font-size: 10px;
      line-height: 1;
      min-height: 0;
    }
    .contract-row-detail-btn {
      padding: 4px 7px;
      font-size: 10px;
      line-height: 1;
      min-height: 0;
      margin-left: 4px;
    }
    .contract-overlay-row-detail {
      margin-top: 6px;
      margin-bottom: 0;
      border: 1px solid #27485a;
      border-radius: 6px;
      background: rgba(7, 14, 20, 0.88);
      padding: 6px 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      line-height: 1.35;
      color: #b9d5e7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    @media (max-width: 1280px) {
      .page {
        grid-template-rows: auto 1fr;
      }
      .top-main {
        grid-template-columns: 1fr;
        row-gap: 8px;
      }
      .top-pipeline {
        padding: 0;
      }
      .top-toolbar {
        justify-content: flex-start;
      }
      .content {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(420px, 1fr) auto;
      }
      .content.view-focus.focus-left-open .panel-left,
      .content.view-focus.focus-right-open .panel-right {
        width: 100%;
        left: 0;
        right: 0;
        max-width: none;
      }
    }
    .react-flow__node-default {
      border-radius: 8px !important;
      border: 1px solid #2d566b !important;
      background: linear-gradient(180deg, #15303f, #112835) !important;
      color: #d7ecf7 !important;
      font-family: "JetBrains Mono", monospace !important;
      font-size: 11px !important;
      min-width: 180px;
    }
    .react-flow__attribution {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module" src="./graph_lab/main.mjs"></script>
</body>
</html>
