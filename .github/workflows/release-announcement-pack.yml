name: Release Announcement Pack

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: "Release date (YYYY-MM-DD)"
        required: false
        default: "2026-03-05"
  push:
    branches:
      - main
    paths:
      - "scripts/build_release_announcement_pack.py"
      - "scripts/validate_release_announcement_pack.py"
      - "scripts/run_release_announcement_pack.sh"
      - "docs/279_release_notes_radarsimpy_frontend_multiplexing_2026_03_05.md"
      - "docs/280_release_one_pager_radarsimpy_2026_03_05.md"
      - "docs/281_release_one_pager_radarsimpy_2026_03_05_ko.md"
      - "docs/282_release_announcement_templates_2026_03_05.md"
      - "docs/reports/radarsimpy_production_release_gate_paid_6m.json"
      - "docs/reports/radarsimpy_readiness_checkpoint_paid_6m.json"
      - "docs/reports/radarsimpy_simulator_reference_parity_paid_6m.json"
      - "docs/reports/graph_lab_playwright_e2e_latest.json"

jobs:
  build-pack:
    runs-on: ubuntu-latest
    env:
      RELEASE_DATE: ${{ inputs.release_date || '2026-03-05' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build + Validate Announcement Pack
        run: |
          chmod +x scripts/run_release_announcement_pack.sh
          REPLACE_DATE="${RELEASE_DATE:-2026-03-05}"
          RELEASE_DATE="${REPLACE_DATE}" scripts/run_release_announcement_pack.sh

      - name: Upload Announcement Pack Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-announcement-pack
          path: |
            docs/reports/release_announcement_pack_latest.json
            docs/reports/release_announcement_pack_latest.md

